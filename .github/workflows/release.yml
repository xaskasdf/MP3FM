name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install MinGW cross-compiler
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Build Linux binary
        run: make

      - name: Build Windows binary
        run: make windows

      - name: Package release artifacts
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          tar czf "dist/mp3fm-${VERSION}-src.tar.gz" \
            mp3fm.py mp3fm.cpp Makefile requirements.txt \
            README.md FORMAT.md UNLICENSE
          cp mp3fm "dist/mp3fm-${VERSION}-linux-amd64"
          cp mp3fm.exe "dist/mp3fm-${VERSION}-windows-amd64.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
